<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Birthday Surprise</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:#333;
    text-align:center;
    padding:40px;
}
.card{
    background:white;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
h1{color:#ff4d6d;}
.message{
    font-size:20px;
    line-height:1.7;
}
.footer{
    margin-top:30px;
    color:#777;
}
</style>
</head>
<body>
<div class="card">
<h1>🎂 Happy Birthday! 🎉</h1>

<div class="message">
<p>You may not expect this...</p>
<p>But someone still remembers.</p>
<p>I hope your day is filled with happiness and beautiful memories.</p>
<p>Maybe some memories never really fade. ✨</p>
</div>

<div class="footer">
❤️ From someone who wishes you the best.
</div>
</div>
</body>
</html>
